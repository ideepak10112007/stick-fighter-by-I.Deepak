<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a0a2e; font-family: monospace; overflow:hidden; user-select:none; }
#gameCanvas { display:block; width:100%; }
#ui { position:absolute; top:0; left:0; width:100%; padding:10px 16px; display:flex; align-items:center; gap:10px; }
.fighter-name { font-size:13px; font-weight:700; color:#fff; width:60px; }
.fighter-name.right { text-align:right; }
.hp-wrap { flex:1; height:18px; background:#111; border:2px solid #333; border-radius:2px; overflow:hidden; }
.hp-fill { height:100%; transition:width 0.15s; border-radius:1px; }
#p1hp { background:linear-gradient(90deg,#22c55e,#4ade80); }
#p2hp { background:linear-gradient(90deg,#ef4444,#f87171); float:right; }
#p2-wrap { direction:rtl; }
#round-info { font-size:12px; color:#fbbf24; background:#000a; padding:2px 10px; border-radius:20px; white-space:nowrap; }
#overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.7); }
#overlay h1 { font-size:48px; color:#fbbf24; text-shadow:0 0 20px #f59e0b; letter-spacing:4px; margin-bottom:8px; }
#overlay p { font-size:14px; color:#a78bfa; margin-bottom:20px; }
#startBtn { padding:12px 32px; background:#4c1d95; border:2px solid #7c3aed; color:#ede9fe; font-size:16px; font-family:monospace; font-weight:700; cursor:pointer; border-radius:4px; letter-spacing:2px; }
#startBtn:hover { background:#5b21b6; }
#controls-hint { position:absolute; bottom:8px; left:0; width:100%; display:flex; justify-content:space-between; padding:0 16px; }
.ctrl { font-size:11px; color:#6b7280; }
.ctrl span { color:#9ca3af; }
#combo-display { position:absolute; top:50px; left:50%; transform:translateX(-50%); font-size:22px; font-weight:700; color:#fbbf24; text-shadow:0 0 10px #f59e0b; opacity:0; transition:opacity 0.3s; pointer-events:none; }
#round-banner { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:36px; font-weight:700; color:#fff; text-shadow:0 0 20px #a78bfa; opacity:0; pointer-events:none; text-align:center; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <span class="fighter-name" id="p1name">Deepak</span>
  <div class="hp-wrap"><div class="hp-fill" id="p1hp" style="width:100%"></div></div>
  <div id="round-info">Round 1</div>
  <div class="hp-wrap" id="p2-wrap"><div class="hp-fill" id="p2hp" style="width:100%"></div></div>
  <span class="fighter-name right" id="p2name">Neha-AI</span>
</div>
<div id="combo-display"></div>
<div id="round-banner"></div>
<div id="overlay">
  <h1>STICK FIGHT</h1>
  <p>1 Player vs AI — Sticky Fellow's!</p>
  <button id="startBtn" onclick="startGame()">PRESS START</button>
  <div style="margin-top:20px;font-size:12px;color:#6b7280;text-align:center;line-height:2">
    A/D = Move &nbsp;|&nbsp; W = Jump &nbsp;|&nbsp; J = Punch &nbsp;|&nbsp; K = Kick &nbsp;|&nbsp; L = Special<br>
    ← → = Move (arrows) &nbsp;|&nbsp; ↑ = Jump
  </div>
</div>
<div id="controls-hint">
  <div class="ctrl">A/D=Move &nbsp; W=Jump &nbsp; <span>J=Punch K=Kick L=Special</span></div>
  <div class="ctrl" style="text-align:right"><span>AI adapts to your style</span></div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, GROUND;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GROUND = H - 80;
}
resize();
window.addEventListener('resize', resize);

const COLORS = { bg1:'#0d0520', bg2:'#150a30', ground:'#1e1040', groundLine:'#7c3aed', p1:'#60a5fa', p2:'#f87171', white:'#ffffff', yellow:'#fbbf24', spark:'#fb923c' };

const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; });

function mkFighter(x, dir, color, isAI) {
  return {
    x, y: GROUND, vx:0, vy:0, dir,
    hp:100, maxHp:100,
    color, isAI,
    state:'idle', stateTimer:0,
    jumpCount:0,
    attackBox:null,
    comboCount:0, comboTimer:0,
    hitStun:0, blockStun:0,
    isBlocking:false,
    specialCooldown:0,
    aiTimer:0, aiAction:null,
    aiMemory:[],
    particles:[],
    limbAngle:{larm:0,rarm:0,lleg:0,rleg:0},
    animT:0,
    onGround: true,
    invincible:0,
    score:0
  };
}

let p1, p2, gameRunning=false, round=1, roundOver=false, roundTimer=0;
const ROUND_TIME = 99;
let timeLeft = ROUND_TIME;
let lastTime = 0;
let p1Wins=0, p2Wins=0;
let aiActionLog = [];

function startGame() {
  document.getElementById('overlay').style.display='none';
  p1 = mkFighter(W*0.25, 1, COLORS.p1, false);
  p2 = mkFighter(W*0.75, -1, COLORS.p2, true);
  round=1; p1Wins=0; p2Wins=0;
  gameRunning=true; roundOver=false;
  timeLeft=ROUND_TIME;
  showBanner('ROUND 1', '#fbbf24');
  requestAnimationFrame(loop);
}

function newRound() {
  p1.x=W*0.25; p1.y=GROUND; p1.vx=0; p1.vy=0; p1.hp=100; p1.state='idle'; p1.hitStun=0; p1.onGround=true;
  p2.x=W*0.75; p2.y=GROUND; p2.vx=0; p2.vy=0; p2.hp=100; p2.state='idle'; p2.hitStun=0; p2.onGround=true;
  roundOver=false; timeLeft=ROUND_TIME;
  round++;
  document.getElementById('round-info').textContent='Round '+round;
  showBanner('ROUND '+round, '#fbbf24');
}

function showBanner(text, color='#fff') {
  const b = document.getElementById('round-banner');
  b.textContent=text; b.style.color=color; b.style.opacity='1';
  setTimeout(()=>{ b.style.opacity='0'; }, 1500);
}

function showCombo(n) {
  if(n<2) return;
  const c = document.getElementById('combo-display');
  c.textContent = n+'x COMBO!';
  c.style.opacity='1';
  clearTimeout(c._t);
  c._t=setTimeout(()=>{ c.style.opacity='0'; }, 900);
}

const ATTACK_DATA = {
  punch: { dur:18, dmg:8, range:70, kb:3, kbY:-1, startup:6 },
  kick:  { dur:24, dmg:13, range:85, kb:5, kbY:-2, startup:8 },
  special:{ dur:30, dmg:22, range:100, kb:9, kbY:-4, startup:10 }
};

function doAttack(attacker, type) {
  if(attacker.state==='attack'||attacker.state==='hurt'||attacker.state==='dead') return;
  if(type==='special'&&attacker.specialCooldown>0) return;
  attacker.state='attack';
  attacker.attackType=type;
  attacker.stateTimer=ATTACK_DATA[type].dur;
  if(type==='special') attacker.specialCooldown=120;
  attacker.hitConnected=false;
}

function tryHit(attacker, defender, type) {
  if(attacker.hitConnected) return;
  const ad = ATTACK_DATA[type];
  const dist = Math.abs(attacker.x - defender.x);
  if(dist < ad.range+30) {
    attacker.hitConnected=true;
    let dmg = ad.dmg;
    if(defender.isBlocking && dist>40) { dmg=Math.round(dmg*0.15); }
    defender.hp = Math.max(0, defender.hp - dmg);
    defender.vx = ad.kb * -defender.dir;
    defender.vy = ad.kbY;
    defender.hitStun = defender.isBlocking ? 8 : 20;
    defender.state = defender.isBlocking ? 'block' : 'hurt';
    spawnHitParticles(defender, type);
    if(!attacker.isAI) {
      attacker.comboCount++;
      attacker.comboTimer=60;
      showCombo(attacker.comboCount);
      aiActionLog.push({action:type, time:Date.now()});
      if(aiActionLog.length>20) aiActionLog.shift();
    }
  }
}

function spawnHitParticles(f, type) {
  const count = type==='special'?12:6;
  const col = type==='special'?'#fbbf24':type==='kick'?'#f87171':'#fff';
  for(let i=0;i<count;i++) {
    f.particles.push({
      x:f.x, y:f.y-60,
      vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8-2,
      life:1, color:col, r:Math.random()*4+2
    });
  }
}

function updatePhysics(f, dt) {
  if(f.state==='dead') return;
  f.vy += 0.6;
  f.x += f.vx;
  f.y += f.vy;
  f.vx *= 0.82;
  if(f.y >= GROUND) { f.y=GROUND; f.vy=0; f.onGround=true; f.jumpCount=0; } else { f.onGround=false; }
  f.x = Math.max(40, Math.min(W-40, f.x));
  f.animT += dt;
  if(f.stateTimer>0) { f.stateTimer--; if(f.stateTimer<=0&&f.state!=='dead'&&f.state!=='hurt') f.state='idle'; }
  if(f.hitStun>0) { f.hitStun--; if(f.hitStun<=0&&f.state==='hurt') f.state='idle'; }
  if(f.comboTimer>0) { f.comboTimer--; if(f.comboTimer<=0) f.comboCount=0; }
  if(f.specialCooldown>0) f.specialCooldown--;
  if(f.invincible>0) f.invincible--;
  f.particles = f.particles.filter(p=>p.life>0);
  f.particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=0.05; p.r*=0.96; });
}

function handlePlayerInput(p, opp) {
  if(p.state==='dead'||p.hitStun>0) return;
  const left = keys['a']||keys['ArrowLeft'];
  const right = keys['d']||keys['ArrowRight'];
  const jump = keys['w']||keys['ArrowUp'];
  const punch = keys['j'];
  const kick = keys['k'];
  const special = keys['l'];
  const block = keys['f']||keys['b'];

  p.dir = p.x < opp.x ? 1 : -1;

  if(p.state==='idle'||p.state==='walk') {
    if(left) { p.vx=-4; p.state='walk'; }
    else if(right) { p.vx=4; p.state='walk'; }
    else if(p.state==='walk') p.state='idle';
    if(jump && p.jumpCount<2) { p.vy=-14; p.jumpCount++; }
    if(punch) doAttack(p,'punch');
    else if(kick) doAttack(p,'kick');
    else if(special) doAttack(p,'special');
    p.isBlocking = block && p.onGround;
    if(p.isBlocking) p.state='block';
  }
  if(p.state==='block'&&!block) p.state='idle';
}

function aiThink(ai, opp) {
  if(ai.state==='dead'||ai.hitStun>0) return;
  ai.aiTimer--;
  if(ai.aiTimer>0) return;

  const dist = Math.abs(ai.x-opp.x);
  const hpRatio = ai.hp/100;
  const oppHpRatio = opp.hp/100;
  ai.dir = ai.x > opp.x ? -1 : 1;

  const recentOppActions = aiActionLog.slice(-8);
  const punchCount = recentOppActions.filter(a=>a.action==='punch').length;
  const kickCount = recentOppActions.filter(a=>a.action==='kick').length;
  const specialCount = recentOppActions.filter(a=>a.action==='special').length;

  let think = '';
  let react = null;

  if(opp.state==='attack') {
    if(Math.random()<0.55) { react='block'; think='Countering attack'; }
    else if(Math.random()<0.4) { react='dodge'; think='Dodging'; }
  }

  if(!react) {
    if(dist>200) { react='approach'; think='Closing gap'; }
    else if(dist<60) { react='retreat'; think='Too close'; }
    else {
      if(hpRatio < 0.3 && Math.random()<0.5) { react='block'; think='Low HP, being safe'; }
      else if(ai.specialCooldown<=0 && Math.random()<0.25) { react='special'; think='Special attack!'; }
      else if(punchCount>kickCount && kickCount>0 && Math.random()<0.45) { react='block'; think='You like punches...'; }
      else if(specialCount>=2 && Math.random()<0.5) { react='dodge'; think='Watching for specials'; }
      else {
        const r=Math.random();
        if(r<0.35) react='punch';
        else if(r<0.65) react='kick';
        else if(r<0.8) react='block';
        else react='jump_attack';
      }
    }
  }

  ai.aiAction=react;
  ai.aiTimer = 12+Math.floor(Math.random()*10);

  if(react==='approach') { ai.vx=ai.dir*3.5; ai.state='walk'; }
  else if(react==='retreat') { ai.vx=-ai.dir*3.5; ai.state='walk'; }
  else if(react==='punch') doAttack(ai,'punch');
  else if(react==='kick') doAttack(ai,'kick');
  else if(react==='special') doAttack(ai,'special');
  else if(react==='block') { ai.isBlocking=true; ai.state='block'; ai.aiTimer=18; }
  else if(react==='dodge') { ai.vx=-ai.dir*6; }
  else if(react==='jump_attack') {
    if(ai.onGround) { ai.vy=-13; }
    setTimeout(()=>doAttack(ai,'kick'),200);
  }

  if(react==='block') { setTimeout(()=>{ ai.isBlocking=false; if(ai.state==='block') ai.state='idle'; },300); }
}

function checkAttacks() {
  if(p1.state==='attack') {
    const ad=ATTACK_DATA[p1.attackType];
    if(p1.stateTimer<=ad.dur-ad.startup) tryHit(p1,p2,p1.attackType);
  }
  if(p2.state==='attack') {
    const ad=ATTACK_DATA[p2.attackType];
    if(p2.stateTimer<=ad.dur-ad.startup) tryHit(p2,p1,p2.attackType);
  }
}

function drawBackground() {
  ctx.fillStyle=COLORS.bg1;
  ctx.fillRect(0,0,W,H);
  for(let i=0;i<W;i+=60) {
    ctx.strokeStyle='rgba(124,58,237,0.08)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke();
  }
  for(let i=0;i<H;i+=60) {
    ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke();
  }
  ctx.fillStyle='rgba(30,16,64,0.9)';
  ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.strokeStyle=COLORS.groundLine;
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,GROUND); ctx.lineTo(W,GROUND); ctx.stroke();
  for(let i=0;i<W;i+=80) {
    ctx.strokeStyle='rgba(124,58,237,0.3)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(i,GROUND); ctx.lineTo(i+40,H); ctx.stroke();
  }
}

function drawStickman(f) {
  const x=f.x, y=f.y;
  const col=f.state==='hurt'?'#fff':f.color;
  const alpha=f.invincible>0&&Math.floor(f.invincible/4)%2===0?0.3:1;
  ctx.globalAlpha=alpha;

  const sc = f.state==='dead'?1:1;
  const bobY = f.onGround&&f.state==='walk'?Math.sin(f.animT*0.3)*3:0;
  const headY = y-120+bobY;
  const shoulderY = y-95+bobY;
  const hipY = y-60+bobY;

  ctx.strokeStyle=col;
  ctx.lineWidth=3;
  ctx.lineCap='round';

  ctx.beginPath(); ctx.arc(x, headY, 14, 0, Math.PI*2);
  ctx.fillStyle=col; ctx.fill(); ctx.stroke();

  ctx.beginPath(); ctx.moveTo(x,headY+14); ctx.lineTo(x,hipY); ctx.stroke();

  let larmAngle, rarmAngle, llegAngle, rlegAngle;

  if(f.state==='attack') {
    const prog = 1-(f.stateTimer/ATTACK_DATA[f.attackType||'punch'].dur);
    const ext = Math.sin(prog*Math.PI)*f.dir;
    if(f.attackType==='punch') {
      larmAngle = -0.3; rarmAngle = prog*1.2*f.dir;
      llegAngle = -0.2; rlegAngle = 0.2;
    } else if(f.attackType==='kick') {
      larmAngle = -0.5*f.dir; rarmAngle = 0.5*f.dir;
      llegAngle = -0.3; rlegAngle = prog*1.8*f.dir;
    } else {
      larmAngle = -1.2*f.dir*prog; rarmAngle = 1.2*f.dir*prog;
      llegAngle = -0.4; rlegAngle = 0.4;
    }
  } else if(f.state==='walk') {
    const sw = Math.sin(f.animT*0.25)*0.7;
    larmAngle = sw*f.dir; rarmAngle = -sw*f.dir;
    llegAngle = sw; rlegAngle = -sw;
  } else if(f.state==='hurt') {
    larmAngle = -1*f.dir; rarmAngle = -0.8*f.dir;
    llegAngle = 0.4; rlegAngle = -0.4;
  } else if(f.state==='block') {
    larmAngle = -0.8*f.dir; rarmAngle = -0.9*f.dir;
    llegAngle = -0.3; rlegAngle = 0.3;
  } else {
    const idle = Math.sin(f.animT*0.05)*0.1;
    larmAngle = -0.3+idle; rarmAngle = 0.3-idle;
    llegAngle = -0.15; rlegAngle = 0.15;
  }

  const armLen=36, legLen=38;
  const lAx = x+Math.sin(larmAngle)*armLen, lAy = shoulderY+Math.cos(larmAngle)*armLen;
  const rAx = x+Math.sin(rarmAngle)*armLen, rAy = shoulderY+Math.cos(rarmAngle)*armLen;
  const lLx = x+Math.sin(llegAngle)*legLen, lLy = hipY+Math.cos(llegAngle)*legLen;
  const rLx = x+Math.sin(rlegAngle)*legLen, rLy = hipY+Math.cos(rlegAngle)*legLen;

  ctx.beginPath(); ctx.moveTo(x,shoulderY); ctx.lineTo(lAx,lAy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,shoulderY); ctx.lineTo(rAx,rAy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,hipY); ctx.lineTo(lLx,lLy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,hipY); ctx.lineTo(rLx,rLy); ctx.stroke();

  if(f.state==='block') {
    ctx.strokeStyle='rgba(96,165,250,0.6)';
    ctx.lineWidth=6;
    ctx.beginPath(); ctx.arc(x-f.dir*10,shoulderY,30,0,Math.PI*2); ctx.stroke();
    ctx.lineWidth=3;
  }

  if(f.state==='attack'&&f.attackType==='special') {
    const prog=1-(f.stateTimer/30);
    ctx.strokeStyle='rgba(251,191,36,'+prog+')';
    ctx.lineWidth=8;
    ctx.beginPath(); ctx.arc(x+f.dir*50,shoulderY,25,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle=col; ctx.lineWidth=3;
  }

  f.particles.forEach(p=>{
    ctx.globalAlpha=p.life*alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });

  ctx.globalAlpha=1;

  if(f.hp>0) {
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(x-22,headY-28,44,8);
    ctx.fillStyle=f.color;
    ctx.fillRect(x-22,headY-28,44*(f.hp/100),8);
  }

  if(f.state==='dead') {
    ctx.fillStyle='#fbbf24';
    ctx.font='bold 16px monospace';
    ctx.textAlign='center';
    ctx.fillText('KO!',x,y-140);
  }
}

function updateHPBars() {
  document.getElementById('p1hp').style.width=Math.max(0,p1.hp)+'%';
  document.getElementById('p2hp').style.width=Math.max(0,p2.hp)+'%';
  const p1pct = p1.hp/100;
  const p2pct = p2.hp/100;
  document.getElementById('p1hp').style.background = p1pct>0.5?'linear-gradient(90deg,#22c55e,#4ade80)':p1pct>0.25?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,#ef4444,#f87171)';
  document.getElementById('p2hp').style.background = p2pct>0.5?'linear-gradient(90deg,#ef4444,#f87171)':p2pct>0.25?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,#22c55e,#4ade80)';
}

let lastSec=0;
function loop(ts) {
  if(!gameRunning) return;
  const dt = Math.min((ts-lastTime)/16.67, 3);
  lastTime=ts;

  if(!roundOver) {
    lastSec+=dt/60;
    if(lastSec>=1) { lastSec=0; timeLeft=Math.max(0,timeLeft-1); }

    handlePlayerInput(p1,p2);
    aiThink(p2,p1);
    updatePhysics(p1,dt);
    updatePhysics(p2,dt);
    checkAttacks();
    updateHPBars();

    if(p1.hp<=0) { p1.state='dead'; roundOver=true; p2Wins++; endRound(false); }
    else if(p2.hp<=0) { p2.state='dead'; roundOver=true; p1Wins++; endRound(true); }
    else if(timeLeft<=0) { roundOver=true; if(p1.hp>=p2.hp){ p1Wins++; endRound(true); } else { p2Wins++; endRound(false); } }
  }

  drawBackground();
  drawStickman(p1);
  drawStickman(p2);

  ctx.fillStyle='#fbbf24';
  ctx.font='bold 20px monospace';
  ctx.textAlign='center';
  ctx.fillText(timeLeft,W/2,38);

  ctx.font='12px monospace';
  ctx.fillStyle='rgba(124,58,237,0.7)';
  ctx.fillText(p1Wins+' - '+p2Wins,W/2,56);

  requestAnimationFrame(loop);
}

function endRound(playerWon) {
  setTimeout(()=>{
    if(p1Wins>=2||p2Wins>=2) {
      const overlay=document.getElementById('overlay');
      overlay.style.display='flex';
      overlay.querySelector('h1').textContent=p1Wins>=2?'YOU WIN!':'GAME OVER';
      overlay.querySelector('h1').style.color=p1Wins>=2?'#4ade80':'#f87171';
      overlay.querySelector('p').textContent=p1Wins>=2?'You defeated the AI!':'The AI defeated you!';
      overlay.querySelector('button').textContent='PLAY AGAIN';
      gameRunning=false;
    } else {
      showBanner(playerWon?'WIN!':'LOST!', playerWon?'#4ade80':'#f87171');
      setTimeout(newRound,1500);
    }
  },1200);
}

</script>
</body>
</html>
